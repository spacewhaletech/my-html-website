<!DOCTYPE html>
<html lang="en">
<body class="services-page"></body>   
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <!-- Link to your assets folder going up two levels -->
  <link rel="stylesheet" href="../../assets/layout/CSS/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a class="logo-link" href="../../index.html">
              <!-- Clean, scaled image replacing the text markup -->
              <img src="../../assets/images/SpaceWhale_SmallLogoAndText_ClearBG_scaled.png" alt="Spacewhale Technologies Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="../../index.html">Home</a></li>
                <li><a class="active" href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a class="cta-btn" href="contact.html">Contact Us</a></li>
            </ul>
        </div>
    </nav>
  <div class="contact-container">
    <h2>Contact Us</h2>
    
    <!-- Notice there is NO 'action' or 'method' attribute here. JavaScript handles it. -->
    <form id="contactForm">
      <div>
        <label for="name">Your Name:</label>
        <input type="text" id="name" required>
      </div>

      <div>
        <label for="email">Your Email:</label>
        <input type="email" id="email" required>
      </div>

      <div>
        <label for="message">Your Message:</label>
        <textarea id="message" rows="5" required></textarea>
      </div>

      <button type="submit" id="submitBtn">Send Message</button>
    </form>

    <!-- UI placeholder to show success/error alerts to the user -->
    <div id="formStatus" style="margin-top: 15px; font-weight: bold;"></div>
  </div>

  <!-- JavaScript Handler -->
  <script>
    document.getElementById('contactForm').addEventListener('submit', async function(event) {
      // 1. Prevent the page from reloading automatically
      event.preventDefault();

      // 2. Target UI elements
      const submitBtn = document.getElementById('submitBtn');
      const formStatus = document.getElementById('formStatus');

      // 3. Change button state to show it is processing
      submitBtn.disabled = true;
      submitBtn.innerText = "Sending...";
      formStatus.innerText = "";
      formStatus.style.color = "black";

      // 4. Gather the input values into a clean object
      const formData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value
      };

      try {
        // 5. Send data to your local Ubuntu Python server via POST
        // NOTE: Replace this URL later with your hosted Cloud production link!
        const response = await fetch('http://127.0.0', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });

        const result = await response.json();

        // 6. Handle server responses
        if (response.ok) {
          formStatus.style.color = "green";
          formStatus.innerText = "✓ " + result.message;
          document.getElementById('contactForm').reset(); // Clear the form fields
        } else {
          formStatus.style.color = "red";
          formStatus.innerText = "✕ Error: " + result.message;
        }

      } catch (error) {
        // Handles instances where Python server is completely turned off or offline
        formStatus.style.color = "red";
        formStatus.innerText = "✕ Server connection failed. Is your Python backend running?";
        console.error("Connection Error:", error);
      } finally {
        // 7. Reset the submit button back to normal
        submitBtn.disabled = false;
        submitBtn.innerText = "Send Message";
      }
    });
  </script>

</body>
</html>
