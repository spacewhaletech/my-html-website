<!DOCTYPE html>
<html lang="en">
<body class="contact-page"></body>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacewhale Technologies | Contact</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/layout/CSS/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a class="logo-link" href="../../index.html">
              <!-- Clean, scaled image replacing the text markup -->
              <img src="../../assets/images/SpaceWhale_SmallLogoAndText_ClearBG_scaled.png" alt="Spacewhale Technologies Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="../../index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a class="cta-btn active" href="contact.html">Contact Us</a></li>
            </ul>
        </div>
    </nav>
    <main>
        <section class="content-section">
            <div class="container">
                <h2 class="section-title">Let's Discuss Your Project</h2>
                <div class="contact-form">
                    <form id="consultationForm" action="#" method="POST">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" required placeholder="john@company.com">
                        </div>
                        <div class="form-group">
                            <label for="message">How can we help you?</label>
                            <textarea id="message" name="message" rows="5" required placeholder="Tell us about your technical challenges..."></textarea>
                        </div>
                        <button type="submit" class="submit-btn">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2020 Spacewhale Technologies. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
